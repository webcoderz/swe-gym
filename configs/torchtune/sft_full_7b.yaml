# TorchTune SFT — Qwen2.5-Coder-7B Full Fine-Tune (default)
#
# Based on SWE-smith's full_ft_qwen_7b.yml, adapted for local training.
# See also: sft_full_32b.yaml, sft_lora_7b.yaml, dpo_7b.yaml
#
# Download model first:
#   tune download Qwen/Qwen2.5-Coder-7B-Instruct --output-dir /tmp/Qwen2.5-Coder-7B-Instruct
#
# Single GPU:
#   tune run full_finetune_single_device --config configs/torchtune/sft_full_7b.yaml
#
# Multi-GPU:
#   tune run --nproc_per_node 2 full_finetune_distributed --config configs/torchtune/sft_full_7b.yaml

output_dir: ./sft_output/

# Model
model:
  _component_: torchtune.models.qwen2_5.qwen2_5_7b_instruct

# Tokenizer
tokenizer:
  _component_: torchtune.models.qwen2_5.qwen2_5_tokenizer
  path: /tmp/Qwen2.5-Coder-7B-Instruct/vocab.json
  merges_file: /tmp/Qwen2.5-Coder-7B-Instruct/merges.txt
  max_seq_len: 32768

# Checkpointer
checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: /tmp/Qwen2.5-Coder-7B-Instruct
  checkpoint_files: [
    model-00001-of-00004.safetensors,
    model-00002-of-00004.safetensors,
    model-00003-of-00004.safetensors,
    model-00004-of-00004.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN2
  safe_serialization: true
resume_from_checkpoint: false

# Dataset — JSONL from step 7 (07_prepare_sft.sh)
dataset:
  _component_: torchtune.datasets.chat_dataset
  source: json
  data_files: ./logs/sft_data/combined_train.jsonl
  split: train
  conversation_column: messages
  conversation_style: openai
  train_on_input: false
  new_system_prompt: null
  packed: false
seed: 42
shuffle: true
batch_size: 1

# Optimizer
optimizer:
  _component_: torch.optim.AdamW
  fused: true
  weight_decay: 0.01
  lr: 1e-4
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 5
optimizer_in_bwd: true
loss:
  _component_: torchtune.modules.loss.CEWithChunkedOutputLoss

# Training
epochs: 3
max_steps_per_epoch: null
gradient_accumulation_steps: 4
compile: true

# Logging — WandB (run `wandb login` once before training)
metric_logger:
  _component_: torchtune.training.metric_logging.WandBLogger
  project: swe-gym
  group: sft-7b-full
  job_type: full_finetune
log_every_n_steps: 1
log_peak_memory_stats: true

# Hardware
device: cuda
dtype: bf16
enable_activation_checkpointing: true
enable_activation_offloading: false

# Profiler (disabled, enable for debugging)
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: false
  output_dir: ${output_dir}/profiling_outputs
  cpu: true
  cuda: true
  profile_memory: false
  with_stack: false
  record_shapes: true
  with_flops: false
  wait_steps: 5
  warmup_steps: 5
  active_steps: 2
  num_cycles: 1
