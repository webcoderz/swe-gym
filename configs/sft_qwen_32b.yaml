# TorchTune SFT — Qwen2.5-Coder-32B Full Fine-Tune
#
# Based on SWE-smith's full_ft_qwen_32b.yml. Requires multi-GPU (2+ GPUs, 80GB each).
#
# Download model first:
#   tune download Qwen/Qwen2.5-Coder-32B-Instruct --output-dir /tmp/Qwen2.5-Coder-32B-Instruct
#
# Launch (minimum 2 GPUs):
#   tune run --nproc_per_node 2 full_finetune_distributed --config configs/sft_qwen_32b.yaml

output_dir: ./sft_output/

# Model
model:
  _component_: torchtune.models.qwen2_5.qwen2_5_32b_instruct

# Tokenizer
tokenizer:
  _component_: torchtune.models.qwen2_5.qwen2_5_tokenizer
  path: /tmp/Qwen2.5-Coder-32B-Instruct/vocab.json
  merges_file: /tmp/Qwen2.5-Coder-32B-Instruct/merges.txt
  max_seq_len: 32768

# Checkpointer
checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: /tmp/Qwen2.5-Coder-32B-Instruct
  checkpoint_files: [
    model-00001-of-00014.safetensors,
    model-00002-of-00014.safetensors,
    model-00003-of-00014.safetensors,
    model-00004-of-00014.safetensors,
    model-00005-of-00014.safetensors,
    model-00006-of-00014.safetensors,
    model-00007-of-00014.safetensors,
    model-00008-of-00014.safetensors,
    model-00009-of-00014.safetensors,
    model-00010-of-00014.safetensors,
    model-00011-of-00014.safetensors,
    model-00012-of-00014.safetensors,
    model-00013-of-00014.safetensors,
    model-00014-of-00014.safetensors,
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN2
  safe_serialization: true
resume_from_checkpoint: false

# Dataset
dataset:
  _component_: torchtune.datasets.chat_dataset
  source: json
  data_files: ./logs/sft_data/combined_train.jsonl
  split: train
  conversation_column: messages
  conversation_style: openai
  train_on_input: false
  new_system_prompt: null
  packed: false
seed: 42
shuffle: true
batch_size: 1

# Optimizer
optimizer:
  _component_: torch.optim.AdamW
  fused: true
  weight_decay: 0.01
  lr: 1e-4
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 5
optimizer_in_bwd: true
loss:
  _component_: torchtune.modules.loss.CEWithChunkedOutputLoss

# Training
epochs: 3
max_steps_per_epoch: null
gradient_accumulation_steps: 1
compile: true

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.WandBLogger
  project: swe-gym
  group: sft-32b-full
  job_type: full_finetune
log_every_n_steps: 1
log_peak_memory_stats: true

# Hardware
device: cuda
dtype: bf16
enable_activation_checkpointing: true
enable_activation_offloading: false
