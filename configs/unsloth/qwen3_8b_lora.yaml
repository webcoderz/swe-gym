# Unsloth SFT — Qwen3-8B LoRA
# Good default for coding agents. Native tool calling support.
# VRAM: ~16GB (16-bit) or ~8GB (4-bit)
#
# Usage:
#   uv run python scripts/08_train_sft_unsloth.py --recipe configs/unsloth/qwen3_8b_lora.yaml
#   uv run python scripts/08_train_sft_unsloth.py --recipe configs/unsloth/qwen3_8b_lora.yaml --four-bit

model: Qwen/Qwen3-8B
mode: lora
four_bit: false

# LoRA config
lora_rank: 64
lora_alpha: 64
lora_targets:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
lr: 2e-4
epochs: 2
batch_size: 1
grad_accum: 8
max_seq_len: 10240
packing: false
warmup_steps: 10
weight_decay: 0.01
lr_scheduler: cosine
