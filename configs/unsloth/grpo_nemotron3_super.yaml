# Unsloth GRPO — NVIDIA Nemotron-3-Super (120B-A12B MoE)
# RL training with SOTA reasoning + agentic model.
# 120B total, ~12B active (MoE). 1M context window.
# VRAM: ~64-72GB (4-bit with vLLM inference)
#
# Usage (model splitting — recommended):
#   uv run python scripts/09_train_grpo.py --recipe configs/unsloth/grpo_nemotron3_super.yaml --device-map balanced
#
# Multi-GPU (DDP):
#   torchrun --nproc_per_node=2 scripts/09_train_grpo.py --recipe configs/unsloth/grpo_nemotron3_super.yaml

model: nvidia/Nemotron-3-Super-120B-A12B
mode: grpo
four_bit: true

lora_rank: 64
lora_alpha: 64
lora_targets:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_up_proj    # MoE-specific combined gate+up projection
  - down_proj

lr: 5e-6
steps: 200
batch_size: 2
num_generations: 4
max_seq_len: 16384
max_completion_len: 4096
reward_mode: hybrid

temperature: 1.0
top_p: 1.0
min_p: 0.01
gpu_memory_utilization: 0.6

# Advanced GRPO
beta: 0.0
importance_sampling_level: token
scale_rewards: group

warmup_steps: 10
weight_decay: 0.01
lr_scheduler: cosine

# MoE optimization (12x faster MoE training)
moe_backend: grouped_mm

# vLLM standby recommended for this large model
vllm_standby: true
