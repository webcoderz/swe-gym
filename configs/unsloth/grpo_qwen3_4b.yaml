# Unsloth GRPO — Qwen3-4B
# Fast GRPO iteration with a smaller model.
# VRAM: ~8GB (4-bit with vLLM inference)
#
# Usage:
#   uv run python scripts/09_train_grpo.py --recipe configs/unsloth/grpo_qwen3_4b.yaml

model: Qwen/Qwen3-4B
mode: grpo
four_bit: true

lora_rank: 32
lora_alpha: 32
lora_targets:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

lr: 5e-6
steps: 200
batch_size: 4
num_generations: 4
max_seq_len: 8192
max_completion_len: 2048
reward_mode: hybrid

temperature: 1.5
min_p: 0.1
gpu_memory_utilization: 0.6

warmup_steps: 10
weight_decay: 0.01
lr_scheduler: cosine
