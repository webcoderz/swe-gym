# Unsloth GRPO — Qwen3-Coder-Next (80B MoE, ~3B active)
# RL training with SOTA coding model. Needs A100/H100 or multi-GPU.
# VRAM: ~46GB (4-bit with vLLM inference)
#
# Usage (model splitting — recommended for 80B MoE):
#   uv run python scripts/09_train_grpo.py --recipe configs/unsloth/grpo_qwen3_coder_next.yaml --device-map balanced
#
# Multi-GPU (DDP):
#   torchrun --nproc_per_node=2 scripts/09_train_grpo.py --recipe configs/unsloth/grpo_qwen3_coder_next.yaml

model: Qwen/Qwen3-Coder-Next
mode: grpo
four_bit: true

lora_rank: 64
lora_alpha: 64
lora_targets:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_up_proj    # MoE-specific combined gate+up projection
  - down_proj

lr: 5e-6
steps: 200
batch_size: 2
num_generations: 4
max_seq_len: 16384
max_completion_len: 4096
reward_mode: hybrid

# Critical generation params for Qwen3-Coder-Next:
temperature: 1.0
top_p: 0.95
top_k: 40
min_p: 0.01
gpu_memory_utilization: 0.6

# Advanced GRPO — GSPO (sequence-level IS, from Qwen team)
importance_sampling_level: sequence
scale_rewards: group
beta: 0.0

warmup_steps: 10
weight_decay: 0.01
lr_scheduler: cosine

# MoE optimization (12x faster MoE training)
moe_backend: grouped_mm
