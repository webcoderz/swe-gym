# SWE-Gym repository configuration
# ─────────────────────────────────────────────────────────────
# Edit these values to target YOUR repository.
# All scripts (shell + Python) and the Makefile read from this single file.
# ─────────────────────────────────────────────────────────────

# ── Target Repository ────────────────────────────────────────
# The GitHub owner (org or user) and repo name you want to build a gym for.
# Example: for https://github.com/pallets/flask → REPO_OWNER=pallets, REPO_NAME=flask
REPO_OWNER=your-org
REPO_NAME=your-repo
PYTHON_VERSION=3.12

# swesmith uses owner__repo as the key (auto-derived, no need to edit)
REPO_KEY=${REPO_OWNER}__${REPO_NAME}

# Test command run inside Docker containers during validation
# Default PythonProfile assumes conda activate testbed; override for pip-based repos
TEST_CMD="cd /testbed && python -m pytest tests/ --disable-warnings --color=no --tb=no --verbose -p no:cacheprovider --continue-on-collection-errors"

# Parallel Docker containers for validation (step 3b)
VALIDATE_WORKERS=4
# ── Environment Build ────────────────────────────────────────
# Install command run inside the Docker image after cloning the repo.
# This should install all dependencies needed to run the test suite.
# Examples:
#   pip:  "python -m pip install -e '.[dev]'"
#   uv:   "curl -LsSf https://astral.sh/uv/install.sh | sh && uv sync"
#   make: "make install"
INSTALL_CMD="python -m pip install -e '.[dev]'"

# ── GEPA gskill Training (Step 4) ───────────────────────────
# Model used by the coding agent during training runs
TRAIN_MODEL=gpt-5-mini
# Model used for reflection (analyzes pass/fail traces → proposes improved skills)
REFLECTION_MODEL=gpt-5.2-pro
# Number of parallel Docker containers for evaluation
TRAIN_WORKERS=6
# Total evaluation budget — higher = better skills but costlier
MAX_METRIC_CALLS=600
# Train/val/test split sizes (number of task instances)
TRAIN_SIZE=200
VAL_SIZE=50
TEST_SIZE=100

# ── Bug Generation (Step 2) ─────────────────────────────────
# Model for LLM-based bug generation (LiteLLM format: provider/model)
BUGGEN_MODEL=openai/gpt-4.1-mini
# n_bugs = variants per function, max_bugs = total cap per strategy
# Breadth > depth: 1 variant per func covers more of the codebase
BUGGEN_N_PER_FUNC=1
BUGGEN_LM_MODIFY=400
BUGGEN_CLASS_BASIC=200
BUGGEN_FUNC_FUN=200
BUGGEN_LM_REWRITE=300
BUGGEN_PROCEDURAL=1000

# ── SFT / GRPO Pipeline (Steps 6-9) ─────────────────────────
# Model for generating expert solve trajectories
SFT_AGENT_MODEL=gpt-5-mini
# Workers for trajectory generation and evaluation
SFT_WORKERS=4
# Base model for fine-tuning (LoRA, GRPO, etc.)
# Qwen3-8B has native tool calling support — much better for coding agents
SFT_BASE_MODEL=Qwen/Qwen3-8B
